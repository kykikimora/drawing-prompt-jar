<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drawing Prompt Jar</title>
    </head>
    <body>
        <h1>Welcome message</h1>
        <h2>The Manifesto | Tools Required</h2>
        <form action="./session.html">
            <fieldset>
                <legend>Select a limitation:</legend>

                <input type="radio" id="limit-one" name="limitation" value="0" selected/>
                <label class="form-label" for="limit-one">Limit 1</label><br />

                <input type="radio" id="limit-two" name="limitation" value="1" />
                <label class="form-label" for="limit-two">Limit 2</label><br />

                <input type="radio" id="limit-three" name="limitation" value="2" />
                <label class="form-label" for="limit-three">Limit 3</label><br />

                <input type="radio" id="limit-four" name="limitation" value="3" />
                <label class="form-label" for="limit-four">Limit 4</label><br />

                <input type="radio" id="limit-five" name="limitation" value="4" />
                <label class="form-label" for="limit-five">Limit 5</label><br />
            </fieldset>

            <button>Go!</button>
        </form>

        <script type="module" src="./js/index.js"></script>
    </body>
</html>
